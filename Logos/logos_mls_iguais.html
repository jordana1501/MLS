
<style>
  .wrap { padding: 20px 0; display: flex; flex-direction: column; gap: 2px; }
  .logo-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 2px; }
  .logo-cell {
    background: #fff;
    padding: 28px 20px 18px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 200px;
    position: relative;
    border: 1px solid #e8e8e8;
    cursor: pointer;
    transition: all 0.2s;
  }
  .logo-cell:hover { border-color: #8B0000; box-shadow: 0 0 0 2px rgba(139,0,0,0.12); z-index: 2; }
  .logo-cell.dark { background: #0d0d1a; border-color: #1a1a2e; }
  .logo-cell.red  { background: #8B0000; border-color: #6a0000; }
  .badge {
    position: absolute; top: 10px; left: 10px;
    background: #8B0000; color: white;
    font-size: 9px; font-weight: 700; letter-spacing: 1.5px;
    padding: 3px 8px; border-radius: 2px; text-transform: uppercase;
  }
  .badge.inv { background: white; color: #8B0000; }
  .option-label {
    font-size: 10px; font-weight: 600; letter-spacing: 2px;
    text-transform: uppercase; color: #999; margin-top: 16px; text-align: center;
  }
  .option-label.light { color: rgba(255,255,255,0.45); }
  .select-btn {
    margin-top: 8px; padding: 5px 16px;
    background: transparent; border: 1px solid #ddd; border-radius: 2px;
    font-size: 10px; font-weight: 600; letter-spacing: 1px;
    text-transform: uppercase; color: #666; cursor: pointer; transition: all 0.2s;
  }
  .select-btn:hover { background: #8B0000; border-color: #8B0000; color: white; }
  .select-btn.inv { border-color: rgba(255,255,255,0.35); color: rgba(255,255,255,0.75); }
  .select-btn.inv:hover { background: white; color: #8B0000; border-color: white; }
</style>

<div class="wrap">
<div class="logo-row">

<!-- 01: Três linhas empilhadas com separadores -->
<div class="logo-cell dark">
  <span class="badge">01</span>
  <svg viewBox="0 0 280 110" width="256" xmlns="http://www.w3.org/2000/svg">
    <!-- left accent bar -->
    <rect x="12" y="10" width="3" height="88" fill="#8B0000"/>
    <!-- Three equal surnames -->
    <text x="26" y="36" font-family="Georgia,serif" font-size="20" font-weight="700" fill="white" letter-spacing="3">MENDES</text>
    <rect x="26" y="41" width="220" height="0.7" fill="rgba(139,0,0,0.5)"/>
    <text x="26" y="60" font-family="Georgia,serif" font-size="20" font-weight="700" fill="white" letter-spacing="3">LOPES</text>
    <rect x="26" y="65" width="220" height="0.7" fill="rgba(139,0,0,0.5)"/>
    <text x="26" y="84" font-family="Georgia,serif" font-size="20" font-weight="700" fill="white" letter-spacing="3">SILVA</text>
    <!-- Advocacia -->
    <text x="26" y="100" font-family="Arial,sans-serif" font-size="7.5" fill="rgba(255,255,255,0.35)" letter-spacing="4">ADVOCACIA · OAB/DF</text>
  </svg>
  <div class="option-label light">01 — Pilha Vertical</div>
  <button class="select-btn inv" onclick="sendPrompt('Gostei da opção 01 - Pilha Vertical, pode desenvolver e gerar o arquivo')">Escolher este</button>
</div>

<!-- 02: Horizontal igual com & entre -->
<div class="logo-cell" style="background:#fff;">
  <span class="badge">02</span>
  <svg viewBox="0 0 280 110" width="256" xmlns="http://www.w3.org/2000/svg">
    <!-- Top red line full -->
    <rect x="10" y="16" width="260" height="2" fill="#8B0000"/>
    <!-- Three surnames same size horizontal -->
    <text x="140" y="52" text-anchor="middle" font-family="Georgia,serif" font-size="13" font-weight="700" fill="#0d0d1a" letter-spacing="1">MENDES  ·  LOPES  ·  SILVA</text>
    <!-- Red dots as separators -->
    <!-- Advocacia centered -->
    <text x="140" y="68" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#8B0000" letter-spacing="6" font-weight="700">ADVOCACIA</text>
    <!-- Bottom red line full -->
    <rect x="10" y="78" width="260" height="2" fill="#8B0000"/>
    <text x="140" y="94" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#aaa" letter-spacing="3">BRASÍLIA · OAB/DF · ATUAÇÃO NACIONAL</text>
  </svg>
  <div class="option-label">02 — Horizontal Clássico</div>
  <button class="select-btn" onclick="sendPrompt('Gostei da opção 02 - Horizontal Clássico, pode desenvolver e gerar o arquivo')">Escolher este</button>
</div>

    <line x1="110" y1="22" x2="170" y2="22" stroke="#8B0000" stroke-width="1.5"/>
    <circle cx="112" cy="29" r="4" fill="none" stroke="#8B0000" stroke-width="1.2"/>
    <circle cx="168" cy="29" r="4" fill="none" stroke="#8B0000" stroke-width="1.2"/>

    <line x1="168" y1="22" x2="168" y2="25" stroke="#8B0000" stroke-width="1"/>
    <!-- 3 nomes mesma fonte e tamanho -->
    <text x="140" y="54" text-anchor="middle" font-family="Georgia,serif" font-size="14" font-weight="700" fill="white" letter-spacing="4">MENDES</text>
    <text x="140" y="70" text-anchor="middle" font-family="Georgia,serif" font-size="14" font-weight="700" fill="white" letter-spacing="4">LOPES</text>

  </svg>
  <div class="option-label light">03 — Balança Centralizada</div>
  <button class="select-btn inv" onclick="sendPrompt('Gostei da opção 03 - Balança Centralizada, pode desenvolver e gerar o arquivo')">Escolher este</button>
</div>

</div>

<div class="logo-row" style="margin-top:2px;">

  </svg>

</div>
