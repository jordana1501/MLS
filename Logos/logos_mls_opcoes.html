
<style>
  body { background: #f5f5f5; }
  .wrap { padding: 24px 0; display: flex; flex-direction: column; gap: 0; }
  .logo-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 2px; }
  .logo-cell {
    background: #fff;
    padding: 32px 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 180px;
    position: relative;
    border: 1px solid #e8e8e8;
    cursor: pointer;
    transition: all 0.2s;
  }
  .logo-cell:hover { border-color: #8B0000; box-shadow: 0 0 0 2px rgba(139,0,0,0.15); z-index: 2; }
  .logo-cell.dark { background: #0d0d1a; border-color: #1a1a2e; }
  .logo-cell.dark:hover { border-color: #8B0000; }
  .badge {
    position: absolute; top: 10px; left: 10px;
    background: #8B0000; color: white;
    font-size: 9px; font-weight: 700; letter-spacing: 1.5px;
    padding: 3px 8px; border-radius: 2px; text-transform: uppercase;
  }
  .option-label {
    font-size: 10px; font-weight: 600; letter-spacing: 2px;
    text-transform: uppercase; color: #999; margin-top: 18px;
    text-align: center;
  }
  .select-btn {
    margin-top: 10px;
    padding: 5px 14px;
    background: transparent;
    border: 1px solid #ddd;
    border-radius: 2px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #666;
    cursor: pointer;
    transition: all 0.2s;
  }
  .select-btn:hover { background: #8B0000; border-color: #8B0000; color: white; }
</style>

<div class="wrap">
<div class="logo-row">

<!-- OPÇÃO 1: Clássico Escudo -->
<div class="logo-cell dark">
  <span class="badge">01</span>
  <svg viewBox="0 0 280 90" width="260" xmlns="http://www.w3.org/2000/svg">
    <!-- Shield -->
    <path d="M16 8 L40 4 L64 8 L64 42 Q64 62 40 72 Q16 62 16 42 Z" fill="none" stroke="#8B0000" stroke-width="1.5"/>
    <path d="M24 13 L40 10 L56 13 L56 42 Q56 56 40 64 Q24 56 24 42 Z" fill="rgba(139,0,0,0.12)" stroke="#8B0000" stroke-width="0.8"/>
    <!-- M inside shield -->
    <text x="40" y="46" text-anchor="middle" font-family="Georgia,serif" font-size="20" font-weight="700" fill="#8B0000">M</text>
    <!-- Name -->
    <text x="78" y="32" font-family="Georgia,serif" font-size="16" font-weight="700" fill="white" letter-spacing="2">MENDES</text>
    <text x="78" y="46" font-family="Georgia,serif" font-size="9" font-weight="400" fill="rgba(139,0,0,0.85)" letter-spacing="2">LOPES &amp; SILVA</text>
    <rect x="78" y="52" width="170" height="0.8" fill="#8B0000"/>
    <text x="78" y="64" font-family="Arial,sans-serif" font-size="8" font-weight="400" fill="rgba(255,255,255,0.4)" letter-spacing="3">ADVOCACIA  |  OAB/DF</text>
  </svg>
  <div class="option-label">01 — Escudo Clássico</div>
  <button class="select-btn" onclick="sendPrompt('Gostei da opção 01 - Escudo Clássico, pode desenvolver esse logo')">Escolher este</button>
</div>

<!-- OPÇÃO 2: Moderno Minimalista -->
<div class="logo-cell" style="background:#fff;">
  <span class="badge">02</span>
  <svg viewBox="0 0 280 90" width="260" xmlns="http://www.w3.org/2000/svg">
    <!-- Vertical red bar -->
    <rect x="0" y="8" width="5" height="68" fill="#8B0000"/>
    <!-- MLS monogram -->
    <text x="18" y="54" font-family="Georgia,serif" font-size="46" font-weight="700" fill="#0d0d1a" letter-spacing="-2">MLS</text>
    <!-- Dot separator -->
    <circle cx="130" cy="38" r="3" fill="#8B0000"/>
    <!-- Name vertical stack -->
    <text x="142" y="30" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#0d0d1a" letter-spacing="3">MENDES, LOPES &amp; SILVA</text>
    <rect x="142" y="36" width="120" height="0.8" fill="#ccc"/>
    <text x="142" y="48" font-family="Arial,sans-serif" font-size="8" fill="#8B0000" letter-spacing="3" font-weight="700">ADVOCACIA</text>
    <text x="142" y="62" font-family="Arial,sans-serif" font-size="7" fill="#999" letter-spacing="2">BRASÍLIA · OAB/DF</text>
  </svg>
  <div class="option-label">02 — Monograma Moderno</div>
  <button class="select-btn" onclick="sendPrompt('Gostei da opção 02 - Monograma Moderno, pode desenvolver esse logo')">Escolher este</button>
</div>

<!-- OPÇÃO 3: Editorial Luxury -->
<div class="logo-cell dark">

    <rect x="20" y="14" width="240" height="1.5" fill="#8B0000"/>
    <!-- Main name -->
    <text x="140" y="42" text-anchor="middle" font-family="Georgia,serif" font-size="22" font-weight="700" fill="white" letter-spacing="8">MENDES</text>

    <!-- Advocacia -->
    <text x="140" y="65" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="rgba(255,255,255,0.45)" letter-spacing="6">ADVOCACIA · OAB/DF</text>
    <!-- Bottom red line -->
    <rect x="20" y="72" width="240" height="1.5" fill="#8B0000"/>

  <div class="option-label">03 — Editorial Luxury</div>
  <button class="select-btn" onclick="sendPrompt('Gostei da opção 03 - Editorial Luxury, pode desenvolver esse logo')">Escolher este</button>
</div>

</div>
<div class="logo-row" style="margin-top:2px;">
