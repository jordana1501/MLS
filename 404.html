<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests">
<meta name="referrer" content="strict-origin-when-cross-origin">
<meta name="theme-color" content="#8B0000">
<meta name="robots" content="noindex, nofollow">
<title>Página não encontrada · Mendes, Lopes &amp; Silva Advocacia</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --red:#8B0000;--red-light:#c0392b;
  --text:#1a1a2e;--text-body:#374151;--gray:#6B7280;
  --bg:#F7F6F4;--border:rgba(139,0,0,0.12);
}
html,body{height:100%;}
body{font-family:'DM Sans',sans-serif;background:linear-gradient(180deg,#ffffff 0%,var(--bg) 100%);color:var(--text);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px;text-align:center;position:relative;overflow:hidden;}
body::before{content:'§';position:absolute;font-family:'Cormorant Garamond',serif;font-size:520px;color:rgba(139,0,0,.04);left:50%;top:50%;transform:translate(-50%,-50%);pointer-events:none;line-height:1;}
.logo{height:64px;width:auto;margin-bottom:50px;position:relative;z-index:1;}
.code{font-family:'Cormorant Garamond',serif;font-size:clamp(96px,18vw,180px);font-weight:300;line-height:1;color:var(--red);position:relative;z-index:1;letter-spacing:-2px;}
.code em{font-style:italic;color:var(--red-light);}
.divider{width:80px;height:1px;background:linear-gradient(90deg,transparent,var(--red),transparent);margin:24px auto;position:relative;z-index:1;}
.title{font-family:'Cormorant Garamond',serif;font-size:clamp(28px,4vw,42px);font-weight:400;color:var(--text);margin-bottom:16px;position:relative;z-index:1;}
.title em{color:var(--red-light);font-style:italic;}
.desc{font-size:15px;color:var(--text-body);max-width:520px;margin:0 auto 40px;font-weight:300;line-height:1.7;position:relative;z-index:1;}
.actions{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;position:relative;z-index:1;}
.btn{padding:15px 36px;font-size:11px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;border:none;border-radius:2px;cursor:pointer;text-decoration:none;display:inline-block;transition:all .3s;}
.btn-primary{background:var(--red);color:#fff;}
.btn-primary:hover{background:var(--red-light);transform:translateY(-2px);box-shadow:0 12px 40px rgba(139,0,0,.25);}
.btn-outline{background:transparent;color:var(--text);border:1px solid rgba(26,26,46,.2);}
.btn-outline:hover{border-color:var(--red);color:var(--red-light);transform:translateY(-2px);}
.footer-note{position:absolute;bottom:24px;left:0;right:0;font-size:11px;color:var(--gray);font-weight:300;letter-spacing:1px;}
@media(max-width:600px){
  .logo{height:48px;margin-bottom:30px;}
  .actions{flex-direction:column;width:100%;max-width:280px;}
  .btn{width:100%;}
}
</style>
</head>
<body>
  <img class="logo" src="logo/logo_mls_dark.svg" alt="Mendes, Lopes &amp; Silva Advocacia">
  <div class="code">4<em>0</em>4</div>
  <div class="divider"></div>
  <h1 class="title">Página <em>não encontrada</em></h1>
  <p class="desc">A página que você procura não existe ou foi movida. Volte ao início ou entre em contato diretamente com nosso escritório.</p>
  <div class="actions">
    <a class="btn btn-primary" href="/">Voltar ao início</a>
    <a class="btn btn-outline" href="https://wa.me/5561993088434" target="_blank" rel="noopener">Falar no WhatsApp</a>
  </div>
  <div class="footer-note">© 2025–2026 Mendes, Lopes &amp; Silva Advocacia · Brasília, DF</div>
</body>
</html>
